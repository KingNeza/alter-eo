name: Revisar mensajes (poll)

on:
  schedule:
    # Cada 5 minutos (GitHub puede retrasarlo unos minutos en horas pico)
    - cron: "*/5 * * * *"
  workflow_dispatch:        # permite ejecutarlo a mano desde la pestaña Actions

# Evita que dos ejecuciones corran al mismo tiempo
concurrency:
  group: poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python bot.py poll
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          TIMEZONE: America/Mexico_City
          DUE_SOON_DAYS: "2"
